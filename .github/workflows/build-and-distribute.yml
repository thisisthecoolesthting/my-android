name: Build & Distribute APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      notes:
        description: 'Build notes (optional)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Get version info
        id: version
        run: |
          VERSION_NAME=$(grep "versionName" app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          VERSION_CODE=$(grep "versionCode" app/build.gradle.kts | head -1 | grep -o '[0-9]*')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          APK_SIZE=$(stat -c%s app/build/outputs/apk/debug/app-debug.apk)
          echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and upload APK
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version_name }}"
          SHA="${{ steps.version.outputs.sha_short }}"
          TAG="v${VERSION}-${SHA}"
          APK_NAME="MyAndroid_${VERSION}_${SHA}.apk"

          gh release delete "$TAG" --yes 2>/dev/null || true

          gh release create "$TAG" \
            app/build/outputs/apk/debug/app-debug.apk#"$APK_NAME" \
            --title "My Android $VERSION ($SHA)" \
            --notes "Automated build from commit $SHA" \
            --latest

          APK_URL=$(gh release view "$TAG" --json assets --jq '.assets[] | select(.name == "'"$APK_NAME"'") | .browserDownloadUrl')
          echo "apk_url=$APK_URL" >> $GITHUB_OUTPUT
          echo "APK URL: $APK_URL"

      - name: Update VPS manifest
        env:
          VPS_MANIFEST_TOKEN: ${{ secrets.VPS_MANIFEST_TOKEN }}
        run: |
          NOTES="${{ github.event.inputs.notes }}"
          if [ -z "$NOTES" ]; then NOTES="Build ${{ steps.version.outputs.version_name }} from ${{ steps.version.outputs.sha_short }}"; fi
          curl -s -X POST https://rickyscontrolcenter.com/api/apk/manifest \
            -H "Authorization: Bearer $VPS_MANIFEST_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"version\":\"${{ steps.version.outputs.version_name }}\",\"versionCode\":${{ steps.version.outputs.version_code }},\"buildAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"apkUrl\":\"${{ steps.release.outputs.apk_url }}\",\"apkSize\":${{ steps.version.outputs.apk_size }},\"commitSha\":\"${{ steps.version.outputs.sha_short }}\",\"appName\":\"My Android\",\"notes\":\"$NOTES\"}"

      - name: Upload APK artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.sha_short }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
