name: Build & Distribute APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      notes:
        description: 'Build notes (optional)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      # ── For release builds, use assembleRelease + sign ──────────────────────
      # - name: Build release APK
      #   run: ./gradlew assembleRelease --no-daemon
      #   env:
      #     KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      #     KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      #     KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      #     STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      - name: Get version info
        id: version
        run: |
          VERSION_NAME=$(grep "versionName" app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          VERSION_CODE=$(grep "versionCode" app/build.gradle.kts | head -1 | grep -o '[0-9]*')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          APK_SIZE=$(stat -c%s app/build/outputs/apk/debug/app-debug.apk)
          echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT

      - name: Upload APK to Google Drive
        id: drive_upload
        env:
          GDRIVE_SA_JSON: ${{ secrets.GDRIVE_SA_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          pip install google-api-python-client google-auth --quiet

          python3 << 'EOF'
          import os, json, sys
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          from google.oauth2 import service_account

          sa_info = json.loads(os.environ['GDRIVE_SA_JSON'])
          creds = service_account.Credentials.from_service_account_info(
              sa_info,
              scopes=['https://www.googleapis.com/auth/drive.file']
          )
          service = build('drive', 'v3', credentials=creds)

          apk_path = 'app/build/outputs/apk/debug/app-debug.apk'
          file_name = f"MyAndroid_${{ steps.version.outputs.version_name }}_${{ steps.version.outputs.sha_short }}.apk"

          # Delete old APKs with same app prefix to keep Drive tidy
          results = service.files().list(
              q=f"name contains 'MyAndroid_' and '{os.environ['GDRIVE_FOLDER_ID']}' in parents and trashed=false",
              fields='files(id,name)'
          ).execute()
          for f in results.get('files', []):
              service.files().delete(fileId=f['id']).execute()
              print(f"Deleted old: {f['name']}")

          # Upload new APK
          file_meta = {
              'name': file_name,
              'parents': [os.environ['GDRIVE_FOLDER_ID']]
          }
          media = MediaFileUpload(apk_path, mimetype='application/vnd.android.package-archive', resumable=True)
          uploaded = service.files().create(body=file_meta, media_body=media, fields='id,webContentLink').execute()

          # Make it publicly readable
          service.permissions().create(
              fileId=uploaded['id'],
              body={'type': 'anyone', 'role': 'reader'}
          ).execute()

          # Direct download URL
          download_url = f"https://drive.google.com/uc?export=download&id={uploaded['id']}"
          print(f"Uploaded: {file_name}")
          print(f"URL: {download_url}")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
              fh.write(f"apk_url={download_url}\n")
              fh.write(f"file_name={file_name}\n")
          EOF

      - name: Update VPS manifest
        env:
          VPS_MANIFEST_TOKEN: ${{ secrets.VPS_MANIFEST_TOKEN }}
        run: |
          NOTES="${{ github.event.inputs.notes }}"
          if [ -z "$NOTES" ]; then
            NOTES="Build from commit ${{ steps.version.outputs.sha_short }}"
          fi

          curl -s -X POST https://rickyscontrolcenter.com/api/apk/manifest \
            -H "Authorization: Bearer $VPS_MANIFEST_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "version": "${{ steps.version.outputs.version_name }}",
              "versionCode": ${{ steps.version.outputs.version_code }},
              "buildAt": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'",
              "apkUrl": "${{ steps.drive_upload.outputs.apk_url }}",
              "apkSize": ${{ steps.version.outputs.apk_size }},
              "commitSha": "${{ steps.version.outputs.sha_short }}",
              "appName": "My Android",
              "notes": "'"$NOTES"'"
            }'

      - name: Upload APK artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.sha_short }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
